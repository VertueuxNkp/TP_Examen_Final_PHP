  Vue "mot de passe oublié"
  ============================================================ -->

<section class="auth-container">

  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-logo">🔑 Mot de passe oublié</h1>
      <p class="auth-subtitle">
        Entrez votre email, nous vous enverrons un lien de réinitialisation.
      </p>
    </div>

    <div id="msg-mdp-oublie" class="message" style="display:none;"></div>

    <div class="auth-form">

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          placeholder="exemple@email.com"
          autocomplete="email"
        />
      </div>

      <button
        type="button"
        id="btn-mdp-oublie"
        class="btn btn--primary btn--full"
        onclick="soumettreMdpOublie()"
      >
        Envoyer le lien
      </button>

    </div>

    <div class="auth-footer">
      <p>
        <a href="#" onclick="naviguerVers('login'); return false;">
          ← Retour à la connexion
        </a>
      </p>
    </div>

  </div>

</section>
