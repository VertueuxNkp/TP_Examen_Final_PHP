<!-- ============================================================
  vues/clients/reset-password.html
  Vue de réinitialisation du mot de passe.
  Chargée par le router quand l'URL contient ?auth=reset_password&token=xxx
  ============================================================ -->

<section class="auth-container">

  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-logo">🔒 Nouveau mot de passe</h1>
      <p class="auth-subtitle">Choisissez un nouveau mot de passe sécurisé.</p>
    </div>

    <div id="msg-reset" class="message" style="display:none;"></div>

    <div class="auth-form">

      <div class="form-group">
        <label for="nouveau_mdp">Nouveau mot de passe</label>
        <div class="input-password">
          <input
            type="password"
            id="nouveau_mdp"
            placeholder="8 caractères minimum"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="btn-toggle-password"
            onclick="toggleMotDePasse('nouveau_mdp', this)"
          >👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmation_mdp">Confirmer le mot de passe</label>
        <div class="input-password">
          <input
            type="password"
            id="confirmation_mdp"
            placeholder="Répétez le mot de passe"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="btn-toggle-password"
            onclick="toggleMotDePasse('confirmation_mdp', this)"
          >👁️</button>
        </div>
      </div>

      <button
        type="button"
        id="btn-reset"
        class="btn btn--primary btn--full"
        onclick="soumettreResetPassword()"
      >
        Réinitialiser mon mot de passe
      </button>

    </div>

  </div>

</section>
