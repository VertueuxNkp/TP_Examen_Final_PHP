<!-- ============================================================
  vues/clients/login.html
  Vue de connexion — injectée dans index.html par le router.js
  ============================================================ -->

<section class="auth-container">

  <div class="auth-card">

    <!-- Logo / En-tête -->
    <div class="auth-header">
      <h1 class="auth-logo">🌐 Réseau Social</h1>
      <p class="auth-subtitle">Connectez-vous à votre compte</p>
    </div>

    <!-- Zone de message (succès ou erreur) -->
    <div id="msg-connexion" class="message" style="display:none;"></div>

    <!-- Formulaire -->
    <div class="auth-form">

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          placeholder="exemple@email.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="mot_de_passe">Mot de passe</label>
        <div class="input-password">
          <input
            type="password"
            id="mot_de_passe"
            placeholder="Votre mot de passe"
            autocomplete="current-password"
          />
          <!-- Bouton pour afficher/masquer le mot de passe -->
          <button
            type="button"
            class="btn-toggle-password"
            onclick="toggleMotDePasse('mot_de_passe', this)"
            aria-label="Afficher le mot de passe"
          >👁️</button>
        </div>
      </div>

      <!-- Lien mot de passe oublié -->
      <div class="form-link">
        <a href="#" onclick="naviguerVers('forgot-password'); return false;">
          Mot de passe oublié ?
        </a>
      </div>

      <button
        type="button"
        id="btn-connexion"
        class="btn btn--primary btn--full"
        onclick="soumettreConnexion()"
      >
        Se connecter
      </button>

    </div>

    <!-- Séparateur -->
    <div class="auth-separator">
      <span>ou</span>
    </div>

    <!-- Lien vers l'inscription -->
    <div class="auth-footer">
      <p>Pas encore de compte ?
        <a href="#" onclick="naviguerVers('register'); return false;">
          <strong>S'inscrire</strong>
        </a>
      </p>
    </div>

  </div>

</section>

<script>
  // Au chargement de cette vue, vérifier les paramètres ?auth= dans l'URL
  // (ex: après activation du compte par email)
  verifierParamsAuth();
</script>
